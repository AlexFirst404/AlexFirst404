<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 860 436" width="100%" role="img" aria-label="stats, activity and contacts"><defs><style>
.mono{font-family:ui-monospace,'Cascadia Code','JetBrains Mono',Consolas,monospace}.nm{font-family:'UF',serif}
.rd{fill:#e0143c;opacity:0}.cy{fill:#00e6d6;opacity:0}
.gl{animation:gl 5s infinite steps(1)}.rdA{animation:rdA 3.6s infinite steps(1)}.cyA{animation:cyA 4.3s infinite steps(1)}
.ln{opacity:0}.l1{animation:l1 9s infinite}.l2{animation:l2 9s infinite}.l3{animation:l3 9s infinite}.cur{animation:cur 1.05s steps(1) infinite}
.gb{opacity:0}.g1{animation:g1 8.5s infinite steps(1)}.g2{animation:g2 11s infinite steps(1)}.g3{animation:g3 13s infinite steps(1)}
.pulse{animation:pulse 1.8s ease-in-out infinite}
@keyframes gl{0%,89%,100%{opacity:1}90%{opacity:.6}91%{opacity:1}95%{opacity:.82}96%{opacity:1}}
@keyframes rdA{0%,86%,100%{opacity:0}87%{opacity:.7;transform:translate(4px,2px)}90%{opacity:0}93%{opacity:.55;transform:translate(-3px,-2px)}94%{opacity:0}}
@keyframes cyA{0%,88%,100%{opacity:0}89%{opacity:.6;transform:translate(-4px,-2px)}91%{opacity:0}94%{opacity:.5;transform:translate(3px,2px)}95%{opacity:0}}
@keyframes l1{0%{opacity:0}2%{opacity:1}30%{opacity:1}33%{opacity:0}100%{opacity:0}}
@keyframes l2{0%,33%{opacity:0}35%{opacity:1}63%{opacity:1}66%{opacity:0}100%{opacity:0}}
@keyframes l3{0%,66%{opacity:0}68%{opacity:1}96%{opacity:1}98%{opacity:0}100%{opacity:0}}
@keyframes cur{50%{opacity:0}}
@keyframes g1{0%,92%,100%{opacity:0;transform:translateY(30px)}93%{opacity:.45;transform:translateY(120px)}94%{opacity:0}}
@keyframes g2{0%,88%,100%{opacity:0;transform:translateY(200px)}89%{opacity:.4;transform:translateY(80px)}90%{opacity:0}}
@keyframes g3{0%,95%,100%{opacity:0;transform:translateY(260px)}96%{opacity:.35;transform:translateY(300px)}97%{opacity:0}}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.35}}
@media (prefers-reduced-motion:reduce){.gl,.rdA,.cyA,.l1,.l2,.l3,.cur,.g1,.g2,.g3,.pulse{animation:none}.rd,.cy,.gb{opacity:0}.ln{opacity:1}.l2,.l3{display:none}}</style>
